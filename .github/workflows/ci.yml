# Validates lint, format, tests, and frontend production build on every push and PR.
# Does not deploy. Integration tests use in-memory SQLite (see tests/integration/conftest.py).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Required so app.database can import before integration tests swap the engine.
      DATABASE_URL: sqlite:///:memory:
      REVIEW_PROVIDER: mock
      OPENAI_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff check
        run: python -m ruff check .

      - name: Ruff format (check only)
        run: python -m ruff format --check .

      - name: Unit tests
        run: python -m pytest tests/ -v --tb=short --ignore=tests/e2e --ignore=tests/integration

      - name: Integration tests
        run: python -m pytest tests/integration/ -v --tb=short

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier (check)
        run: npm run format:check

      - name: Production build
        run: npm run build
