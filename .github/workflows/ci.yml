# Validates lint, format, tests, and frontend production build on every push and PR.
# Does not deploy. Integration tests use in-memory SQLite (see tests/integration/conftest.py).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Required so app.database can import before integration tests swap the engine.
      DATABASE_URL: "sqlite:///:memory:"
      REVIEW_PROVIDER: mock
      OPENAI_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff check
        run: python -m ruff check .

      - name: Ruff format (check only)
        run: python -m ruff format --check .

      - name: Unit tests
        run: python -m pytest tests/ -v --tb=short --ignore=tests/e2e --ignore=tests/integration

      - name: Integration tests
        run: python -m pytest tests/integration/ -v --tb=short

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier (check)
        run: npm run format:check

      - name: Production build
        run: npm run build

  playwright:
    name: Playwright E2E (agent dashboard)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: review_insight_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d review_insight_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/review_insight_e2e
      TESTING: "true"
      LLM_PROVIDER: scripted
      REVIEW_PROVIDER: mock
      OPENAI_API_KEY: ""
      NEXT_PUBLIC_API_URL: http://localhost:8000
      PLAYWRIGHT_BACKEND_URL: http://localhost:8000
      PLAYWRIGHT_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Apply database migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Start backend
        working-directory: backend
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../backend-e2e.log 2>&1 &
          echo $! > ../backend-e2e.pid
          for i in {1..40}; do
            if curl -fsS http://localhost:8000/api/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat ../backend-e2e.log
          exit 1

      - name: Start frontend
        working-directory: frontend
        run: |
          npm run dev > ../frontend-e2e.log 2>&1 &
          echo $! > ../frontend-e2e.pid
          for i in {1..60}; do
            if curl -fsS http://localhost:3000 > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat ../frontend-e2e.log
          exit 1

      - name: Run Playwright E2E
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/playwright-report/
            frontend/test-results/
            backend-e2e.log
            frontend-e2e.log
          if-no-files-found: ignore
