[tool.ruff]
target-version = "py312"
line-length = 99

[tool.ruff.lint]
select = [
    "F",      # pyflakes
    "E", "W", # pycodestyle
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "SIM",    # flake8-simplify
    "T20",    # flake8-print (catches stray prints)
    "RUF",    # ruff-specific rules
]
ignore = [
    "E501",   # line length handled by formatter
    "B008",   # function-call-in-default-argument — false positive on FastAPI Depends()
]

[tool.ruff.lint.per-file-ignores]
"scripts/*"    = ["T201"]           # print() is fine in CLI scripts
"alembic/*"    = ["UP", "I001"]     # alembic auto-generated files
"tests/*"      = ["T201"]
"app/models/*" = ["F821"]           # SQLAlchemy string forward-refs ("Model")

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
